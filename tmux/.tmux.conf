# =============================================================================
# Terminal Settings
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable xterm key sequences passthrough (Ctrl+], etc.)
set -g xterm-keys on

# Extended keys support (tmux 3.2+)
set -s extended-keys on
set -as terminal-features ',xterm-256color:extkeys'

# =============================================================================
# General Settings
# =============================================================================
# Reduce escape delay (faster vi mode switching in shell)
set -sg escape-time 10

# Increase scrollback buffer
set -g history-limit 10000

# Enable mouse support
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable focus events (for vim/editor integrations)
set -g focus-events on

# =============================================================================
# Pane Border
# =============================================================================
set -g pane-border-style fg=colour245
set -g pane-active-border-style fg=colour75

# =============================================================================
# Pane Opacity (dim non-active panes)
# =============================================================================
set -g window-style 'fg=colour242,bg=terminal'
set -g window-active-style 'fg=terminal,bg=terminal'

# =============================================================================
# Key Bindings
# =============================================================================
# Vim-style pane navigation without prefix
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# =============================================================================
# Right-Click Context Menu (extends default with clipboard/screenshot options)
# =============================================================================
bind -n MouseDown3Pane if-shell -F -t = \
  "#{||:#{mouse_any_flag},#{&&:#{pane_in_mode},#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}}}" \
  { select-pane -t = ; send-keys -M } \
  { display-menu -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M \
    "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Top,}" < { send-keys -X history-top } \
    "#{?#{m/r:(copy|view)-mode,#{pane_mode}},Go To Bottom,}" > { send-keys -X history-bottom } \
    '' \
    "#{?mouse_word,Search For #[underscore]#{=/9/...:mouse_word},}" C-r { if-shell -F "#{?#{m/r:(copy|view)-mode,#{pane_mode}},0,1}" "copy-mode -t=" ; send-keys -X -t = search-backward -- "#{q:mouse_word}" } \
    "#{?mouse_word,Type #[underscore]#{=/9/...:mouse_word},}" C-y { copy-mode -q ; send-keys -l "#{q:mouse_word}" } \
    "#{?mouse_word,Copy #[underscore]#{=/9/...:mouse_word},}" c { copy-mode -q ; set-buffer "#{q:mouse_word}" } \
    "#{?mouse_line,Copy Line,}" l { copy-mode -q ; set-buffer "#{q:mouse_line}" } \
    '' \
    "#{?mouse_hyperlink,Type #[underscore]#{=/9/...:mouse_hyperlink},}" C-h { copy-mode -q ; send-keys -l "#{q:mouse_hyperlink}" } \
    "#{?mouse_hyperlink,Copy #[underscore]#{=/9/...:mouse_hyperlink},}" h { copy-mode -q ; set-buffer "#{q:mouse_hyperlink}" } \
    '' \
    "Paste (clipboard)" p { run-shell -b '$HOME/.tmux/scripts/paste-clipboard.sh' } \
    "Paste screenshot path" P { run-shell -b '$HOME/.tmux/scripts/paste-screenshot-path.sh' } \
    '' \
    "Horizontal Split" h { split-window -h } \
    "Vertical Split" v { split-window -v } \
    '' \
    "#{?#{>:#{window_panes},1},,-}Swap Up" u { swap-pane -U } \
    "#{?#{>:#{window_panes},1},,-}Swap Down" d { swap-pane -D } \
    "#{?pane_marked_set,,-}Swap Marked" s { swap-pane } \
    '' \
    Kill X { kill-pane } \
    Respawn R { respawn-pane -k } \
    "#{?pane_marked,Unmark,Mark}" m { select-pane -m } \
    "#{?#{>:#{window_panes},1},,-}#{?window_zoomed_flag,Unzoom,Zoom}" z { resize-pane -Z } \
  }

# =============================================================================
# Status Bar
# =============================================================================
# Show prefix key indicator when entering tmux command
set -g status-left-length 20
set -g status-left "#{?client_prefix,#[bg=colour214]#[fg=colour0] TMUX #[default] ,  }"

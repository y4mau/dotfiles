# =============================================================================
# Terminal Settings
# =============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Enable xterm key sequences passthrough (Ctrl+], etc.)
set -g xterm-keys on

# Extended keys support (tmux 3.2+)
set -s extended-keys on
set -as terminal-features ',xterm-256color:extkeys'

# =============================================================================
# General Settings
# =============================================================================
# Reduce escape delay (faster vi mode switching in shell)
set -sg escape-time 10

# Increase scrollback buffer
set -g history-limit 10000

# Enable mouse support
set -g mouse on

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable focus events (for vim/editor integrations)
set -g focus-events on

# =============================================================================
# Pane Border
# =============================================================================
set -g pane-border-style fg=colour245
set -g pane-active-border-style fg=colour75

# =============================================================================
# Pane Opacity (dim non-active panes)
# =============================================================================
set -g window-style 'fg=colour242,bg=terminal'
set -g window-active-style 'fg=terminal,bg=terminal'

# =============================================================================
# Key Bindings
# =============================================================================
# Vim-style pane navigation without prefix
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# =============================================================================
# Status Bar
# =============================================================================
# Show prefix key indicator when entering tmux command
set -g status-left-length 20
set -g status-left "#{?client_prefix,#[bg=colour214]#[fg=colour0] TMUX #[default] ,  }"
